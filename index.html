<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Page</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <header>
        <h1>The Gadget Emporium</h1>
    </header>

    <!-- Product Card 1 -->
    <figure class="card">
        <img src="./images/headphone.jpg" alt="Sleek wireless headphones in matte black" class="headphones">
        <figcaption class="title">Wireless Headphones</figcaption>
        <p class="price"> price =₹ 600</p>
        <ul>
            <li>Active noise cancellation</li>
            <li>20-hour battery life</li>
            <li>Bluetooth 5.2 connectivity</li>
        </ul>
    </figure>

    <!-- Product Card 2 -->
    <figure class="card">
        <img src="./images/keyboard.jpg" alt="Minimalist mechanical keyboard with RGB backlighting"  class="keyboard">
        <figcaption class="title">Mechanical Keyboard</figcaption>
        <p class="price"> price = ₹700</p>
        <ul>
            <li>Clicky blue switches</li>
            <li>Detachable USB-C cable</li>
            <li>Aluminum top frame</li>
        </ul>
    </figure>
    <figure class="card">
        <img src="./images/mouse.jpg" alt="Sleek wireless headphones in matte black" class="mouse">
        <figcaption class="title">Mouse</figcaption>
        <p class="price"> price = ₹500</p>
        <ul>
            <li>ultimate comfort and precision with the Rest Wireless Gaming Mouse</li>
            <li>No delay in parformance</li>
            <li>Bluetooth 5.2 connectivity</li>
        </ul>
    </figure>

</body>
</html>
